# Konfigurasi Tmux untuk Aplikasi Forecasting

# Aktifkan mouse untuk navigasi
set -g mouse on

# Prefix key (gunakan Ctrl+A alih-alih Ctrl+B)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Pindahkan info bar ke bawah
set-option -g status-position bottom

# Warna bar
set-option -g status-bg black
set-option -g status-fg white
set-option -g status-left-length 40
set-option -g status-right-length 80
set-option -g status-right '#[fg=cyan]%H:%M #[fg=green]%d/%m #[fg=yellow]%Y'

# Warna window
set-window-option -g window-status-current-bg red
set-window-option -g window-status-current-attr bright

# Aktifkan activity monitoring
set-window-option -g monitor-activity on
set-option -g visual-activity on

# Timeout untuk menampilkan indikator activity
set-option -g display-time 3000

# Aktifkan pane dan window titles
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g set-titles-string 'Forecast-Vibecoding: #{pane_current_command}'

# Konfigurasi scrolling
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Durasi respawn untuk window yang crash
set-window-option -g remain-on-exit on

# Aktifkan sinkronisasi pane opsional (Ctrl+A + Shift+: lalu ketik: setw synchronize-panes on)
bind-key ^s setw synchronize-panes on